<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="index.html" class="logo">FinTrack</a>
    
        </nav>
    </header>
    <section id="login-section" class="card">
            <div class="card-header">
                <h2>Login</h2>
                <p>Sign in to access your dashboard and manage your money in one place.</p>
            </div>
            <form id="login-form" class="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-status" class="small-note"></p>
            <p class="small-note">Don't have an account? <a href="signup.html">Create one here</a>.</p>
        </section>
    <script type="module" src="auth.js"></script>
    <script type="module"src="login.js"></script>
</body>
</html>
